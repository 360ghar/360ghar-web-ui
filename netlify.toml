[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  PUPPETEER_CACHE_DIR = "./node_modules/.cache/puppeteer"
  NODE_VERSION = "20"
  VITE_API_SERVER = "https://api.360ghar.com"
  VITE_API_BASE_URL = "https://api.360ghar.com/api/v1"
  # Prerender tuning. Netlify persists node_modules/.cache across builds, so
  # the content-hash cache there survives deploys and skips unchanged renders.
  PRERENDER_CONCURRENCY = "5"
  PRERENDER_CACHE_DIR = "node_modules/.cache/prerender-html"

# ── Server-side redirects (processed top-to-bottom, BEFORE the SPA catch-all) ──

# WWW → non-www (consolidate authority)
[[redirects]]
  from = "https://www.360ghar.com/*"
  to = "https://360ghar.com/:splat"
  status = 301
  force = true

# Trailing slash normalization — force=true ensures this fires before the SPA catch-all
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = true

# City slug normalization: gurugram → gurgaon
[[redirects]]
  from = "/gurugram/*"
  to = "/gurgaon/:splat"
  status = 301

# City slug normalization for Hindi: /hi/gurugram/ → /hi/gurgaon/
[[redirects]]
  from = "/hi/gurugram/*"
  to = "/hi/gurgaon/:splat"
  status = 301

# Hindi apartments → flats redirects
[[redirects]]
  from = "/hi/:city/buy/apartments"
  to = "/hi/:city/buy/flats"
  status = 301

[[redirects]]
  from = "/hi/:city/rent/apartments"
  to = "/hi/:city/rent/flats"
  status = 301

[[redirects]]
  from = "/hi/:city/pg/apartments"
  to = "/hi/:city/pg/flats"
  status = 301

# Deduplicate flats/apartments: apartments → flats for all city/intent combos
[[redirects]]
  from = "/:city/buy/apartments"
  to = "/:city/buy/flats"
  status = 301

[[redirects]]
  from = "/:city/rent/apartments"
  to = "/:city/rent/flats"
  status = 301

[[redirects]]
  from = "/:city/pg/apartments"
  to = "/:city/pg/flats"
  status = 301

# Deep-link verification files — served by the backend so a single source of
# truth (APP_REGISTRY + DEEPLINK_*_ANDROID_SHA256 env) owns every app's
# fingerprints. force=true keeps these above the SPA catch-all below.
[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "https://api.360ghar.com/.well-known/assetlinks.json"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/apple-app-site-association"
  to = "https://api.360ghar.com/.well-known/apple-app-site-association"
  status = 200
  force = true

# SPA fallback - serve index.html for all unmatched routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── SEO AUDIT FIX: Global security headers (issues #8, #26, #1, #40) ──────
# These were missing on ~99% of URLs. Applied to all responses.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    # Content-Security-Policy intentionally omitted for now. The previous CSP
    # silently broke Formspree forms (form-action), Places/Maps autocomplete
    # (connect-src), the AI Design Studio / Puter (script+connect-src) and Vimeo
    # tours (frame-src). Add a deploy-preview-tested CSP in a dedicated
    # security-hardening PR instead.

# Hashed JS chunks — content-addressed, safe to cache forever
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Hashed CSS chunks — content-addressed, safe to cache forever
[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Webfonts (Font Awesome woff2) — immutable
[[headers]]
  for = "/assets/webfonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Static CSS from public/ (Bootstrap, Font Awesome CSS, local fonts)
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=604800"

# Images — 30 days with stale-while-revalidate
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=604800"

# Service worker — never cache so updates propagate immediately
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/registerSW.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# HTML pages — short fresh cache + stale-while-revalidate for instant edge TTFB.
# Prerendered HTML is static; a fresh deploy propagates within 60s (max-age) at
# the browser and immediately at the edge (SWR fetches fresh in background).
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=604800"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "0"

# Root index.html — with Link headers for agent discovery (RFC 8288)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=604800"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Link = '''</.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json", </for-ai>; rel="service-doc"; type="text/html", </data/llm-feed.json>; rel="service-meta"; type="application/json", </.well-known/mcp/server-card.json>; rel="mcp-server", </.well-known/agent-skills/index.json>; rel="agent-skills", </llms.txt>; rel="llms-txt", </.well-known/openid-configuration>; rel="openid-configuration"'''

# ── .well-known agent discovery files ──────────────────────────────────────

[[headers]]
  for = "/.well-known/api-catalog"
  [headers.values]
    Content-Type = "application/linkset+json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/openid-configuration"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/oauth-authorization-server"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/oauth-protected-resource"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/mcp/server-card.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/agent-skills/index.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/agent-skills/*/SKILL.md"
  [headers.values]
    Content-Type = "text/markdown"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/acp.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/ucp"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/ai.txt"
  [headers.values]
    Content-Type = "text/plain"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/openapi.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"
